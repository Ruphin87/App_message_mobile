name: message_ko
description: Application de messagerie Message_KO - Phase 1
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  flutter_dotenv: ^5.1.0
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  cached_network_image: ^3.3.1
  sqflite: ^2.3.3
  path: ^1.9.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  record: ^6.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  flutter_webrtc: ^0.12.11
  permission_handler: ^11.1.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  http: ^1.2.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  # adaptive_icon_background: "#2196F3"  # décommentez pour une icône adaptative (Android 8+)
  # adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icon/icon.png
    - assets/images/logo_eni.png
    - assets/audio/ringback_tone.wav
    - assets/audio/incoming_ringtone.wav
